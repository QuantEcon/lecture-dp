name: Build Cache
on:
  schedule:
    - cron: '0 2 * * 1'  # Every Monday at 2am UTC
  workflow_dispatch:      # Manual trigger when needed
  push:
    branches: [main]
    paths: [environment.yml]   # Rebuild cache when the environment changes

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/quantecon/quantecon-build:latest
    permissions:
      contents: read
      issues: write
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Build and Cache Lectures
        uses: quantecon/actions/build-jupyter-cache@v0.8.0
        with:
          builders: 'html'
          create-issue-on-failure: true
